<div id="welcome-screen" style="
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #FAF7F4;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 0.8s ease, transform 0.8s ease;
">
  <h1 style="
    font-family: 'Noto Serif SC', 'Songti SC', Georgia, serif;
    font-size: 3rem;
    font-weight: 300;
    color: #2A1A18;
    letter-spacing: 0.1em;
  ">Welcome!</h1>
</div>

<script>
  var shown = sessionStorage.getItem('welcomeShown');
  var welcome = document.getElementById('welcome-screen');

  if (shown) {
    welcome.style.display = 'none';
  } else {
    sessionStorage.setItem('welcomeShown', 'true');
    window.addEventListener('load', function() {
      setTimeout(function() {
        welcome.style.opacity = '0';
        welcome.style.transform = 'translateY(-20px)';
        setTimeout(function() {
          welcome.style.display = 'none';
        }, 800);
      }, 1800);
    });
  }
</script>

<div class="post-content" style="text-align: center; margin-top: 50px;">
  <p>Welcome to my personal space. Click "文章" in the sidebar to see my posts.</p>
</div>
