<header id="topbar-wrapper" class="flex-shrink-0" aria-label="Top Bar">
  <div id="topbar" class="d-flex align-items-center justify-content-between px-lg-3 h-100">
    
    <div class="d-flex align-items-center">
      <button type="button" id="sidebar-trigger" class="btn btn-link ms-1">
        <i class="fas fa-bars fa-fw"></i>
      </button>

      <div class="ms-3 me-3">
        <a href="{{ '/' | relative_url }}" class="site-title-nav fw-bold">
          {{ site.title }}
        </a>
      </div>

      <nav id="breadcrumb" aria-label="Breadcrumb" class="d-none d-md-flex align-items-center">
        {% assign paths = page.url | split: '/' | compact %}
        
        {% if paths.size == 0 or page.layout == 'home' %}
          <span>{{ site.data.locales[include.lang].tabs.home | capitalize }}</span>
        {% else %}
          <span class="me-2">
            <a href="{{ '/' | relative_url }}">
              {{ site.data.locales[include.lang].tabs.home | capitalize }}
            </a>
          </span>
          
          <span>{{ page.title }}</span>
        {% endif %}
      </nav>
    </div>

    <div class="d-flex align-items-center">
      <button type="button" id="search-trigger" class="btn btn-link" aria-label="Search">
        <i class="fas fa-search fa-fw"></i>
      </button>
      
      <search id="search" class="align-items-center ms-3 ms-lg-0">
        <i class="fas fa-search fa-fw"></i>
        <input class="form-control" id="search-input" type="search" aria-label="search" autocomplete="off" 
               placeholder="{{ site.data.locales[include.lang].search.hint | capitalize }}...">
      </search>
      
      <button type="button" class="btn btn-link text-decoration-none" id="search-cancel">
        {{- site.data.locales[include.lang].search.cancel -}}
      </button>
    </div>

  </div>
</header>

<script>
  (function() {
    const trigger = document.getElementById('sidebar-trigger');
    const html = document.documentElement;

    if (localStorage.getItem('sidebar-open') === 'true') {
      html.setAttribute('data-sidebar-visible', 'true');
    }

    if (trigger) {
      trigger.addEventListener('click', function(e) {
        e.preventDefault();
        const isNowOpen = html.getAttribute('data-sidebar-visible') === 'true';
        const newState = !isNowOpen;
        html.setAttribute('data-sidebar-visible', newState);
        localStorage.setItem('sidebar-open', newState);
        
        if (newState) {
          document.body.setAttribute('sidebar-display', '');
        } else {
          document.body.removeAttribute('sidebar-display');
        }
      });
    }
  })();
</script>
